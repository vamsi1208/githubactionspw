name: Playwright CI Pipeline

# ==========================================
# EVENTS THAT TRIGGER THIS WORKFLOW
# ==========================================
on:

  # Allows manual execution from GitHub UI
  workflow_dispatch:

  # Execute whenever code is pushed to main
  push:
    branches:
      - main

  # Execute when a Pull Request targets main
  pull_request:
    branches:
      - main

  # Nightly regression run
  # 02:00 UTC = 07:30 IST
  schedule:
    - cron: '0 2 * * *'

# ==========================================
# JOB DEFINITIONS
# ==========================================
jobs:

  playwright-tests:

    # GitHub provisions a fresh Ubuntu VM
    runs-on: ubuntu-latest

    # Optional timeout protection
    timeout-minutes: 30

    steps:

      # --------------------------------------
      # Checkout repository source code
      # Equivalent to git clone
      # --------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --------------------------------------
      # Install NodeJS
      # Adds node, npm and npx to PATH
      # --------------------------------------
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # --------------------------------------
      # Cache npm packages
      # Speeds up future workflow runs
      # --------------------------------------
      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      # --------------------------------------
      # Install dependencies from package.json
      # --------------------------------------
      - name: Install Dependencies
        run: npm ci

      # --------------------------------------
      # Download Playwright browsers
      # Chromium / Firefox / WebKit
      # --------------------------------------
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # --------------------------------------
      # Execute tests
      # --------------------------------------
      - name: Run Playwright Tests
        run: npm test

      # --------------------------------------
      # Upload Playwright HTML report
      # Even if tests fail
      # --------------------------------------
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
